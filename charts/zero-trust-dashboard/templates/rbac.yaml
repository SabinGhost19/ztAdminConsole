{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-role
rules:
  # Management of Zero Trust Custom Resources
  - apiGroups: ["devsecops.licenta.ro"]
    resources: 
      - jitaccessrequests
      - zerotrustapplications
      - supplychainattestations
      - zerotrustsecrets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Required for Drift Detection and Dashboard Overview Insights
  - apiGroups: ["", "apps", "networking.k8s.io", "security.istio.io", "crds.external-secrets.io"]
    resources:
      - pods
      - namespaces
      - deployments
      - networkpolicies
      - authorizationpolicies
      - secrets
      - externalsecrets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zero-trust-dashboard.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
