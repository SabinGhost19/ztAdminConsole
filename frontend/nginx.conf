server {
    listen 80;
    server_name localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Hashed Vite assets MUST NOT fall back to index.html. If a chunk is
    # missing, the right answer is HTTP 404 — returning index.html (which
    # is text/html) confuses the browser into a "disallowed MIME type"
    # error when it tries to load the file as an ES module.
    # Aggressive caching is safe here because the filenames are
    # content-hashed by Vite (e.g. JitAccess-DOPOrtoN.js).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # index.html itself must NEVER be cached — it is the source of truth
    # that points the browser at the current set of hashed chunks. A
    # stale index.html is the root cause of the MIME-type errors.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # SPA history-mode fallback: every non-asset, non-API path resolves
    # to index.html so Vue Router can pick it up client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service.
    # We DO NOT forward X-Forwarded-Email anymore; the backend derives
    # identity from the Authorization: Bearer JWT issued by Keycloak.
    # Allowing the SPA (or any caller) to set X-Forwarded-Email here
    # would be an identity-spoofing primitive.
    location /api/ {
        proxy_pass http://zero-trust-dashboard-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Email "";
        proxy_set_header Authorization $http_authorization;
    }

    # Static auth bootstrap config served from the ConfigMap mount.
    # Cached for 30s so the SPA picks up rotated values quickly without
    # hammering the file each navigation.
    location = /auth-config.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, max-age=30";
        try_files $uri =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
