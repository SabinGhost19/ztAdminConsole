apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-backend
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "zero-trust-dashboard.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "zero-trust-dashboard.name" . }}-backend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health # Ensure you have a health endpoint in FastAPI
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            ## --- Legacy M2M admin client (keycloak_service.py) -----
            - name: KEYCLOAK_URL
              value: "http://keycloak.platform-identity.svc.cluster.local/"
            - name: KEYCLOAK_REALM
              value: "ZeroTrust-Realm"
            - name: KEYCLOAK_CLIENT_ID
              value: "jit-backend-api"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jit-backend-keycloak
                  key: client-secret
            ## --- Dashboard SPA OIDC (security/identity.py) ----------
            - name: DASHBOARD_KEYCLOAK_PUBLIC_URL
              value: {{ .Values.keycloak.url | quote }}
            - name: DASHBOARD_KEYCLOAK_ISSUER
              value: "{{ .Values.keycloak.url }}/realms/{{ .Values.keycloak.realm }}"
            - name: DASHBOARD_KEYCLOAK_JWKS_URL
              value: "http://keycloak.platform-identity.svc.cluster.local/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/certs"
            - name: DASHBOARD_KEYCLOAK_AUDIENCE
              value: {{ .Values.keycloak.dashboardClient.audience | quote }}
            - name: DASHBOARD_KEYCLOAK_CLIENT_ID
              value: {{ .Values.keycloak.dashboardClient.clientId | quote }}
            - name: DASHBOARD_KEYCLOAK_GROUPS_CLAIM
              value: {{ .Values.keycloak.dashboardClient.groupsClaim | quote }}
            - name: BYPASS_AUTH
              value: {{ .Values.auth.bypass | quote }}
            - name: BYPASS_AUTH_EMAIL
              value: {{ .Values.auth.bypassEmail | quote }}
            ## --- GUAC knowledge-graph proxy (services/guac_service.py) ----
            ## Set guac.graphqlUrl to "" in values.yaml to disable Blast Radius.
            - name: GUAC_GRAPHQL_URL
              value: {{ .Values.guac.graphqlUrl | quote }}
            ## --- JIT downloadable kubeconfig (services/jit_kubeconfig.py) ----
            ## External API server URL + optional CA embedded into the JIT kubeconfig.
            - name: JIT_EXTERNAL_APISERVER
              value: {{ .Values.jit.externalApiServer | quote }}
            - name: JIT_CLUSTER_CA_DATA
              value: {{ .Values.jit.clusterCaData | quote }}
            {{- if .Values.breakglass.enabled }}
            - name: BREAKGLASS_JWT_PRIVATE_KEY_PATH
              value: /etc/breakglass/private.pem
            {{- end }}
          {{- if .Values.breakglass.enabled }}
          volumeMounts:
            - name: breakglass-keys
              mountPath: /etc/breakglass
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- if .Values.breakglass.enabled }}
      volumes:
        - name: breakglass-keys
          secret:
            secretName: {{ .Values.breakglass.secretName }}
            optional: true
      {{- end }}
