fullnameOverride: "zero-trust-dashboard"

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/sabinghost19/ztadminconsole-frontend
    pullPolicy: IfNotPresent
    tag: "6d46fff"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/sabinghost19/ztadminconsole-backend
    pullPolicy: IfNotPresent
    tag: "6d46fff"
  resources:
    limits:
      cpu: 1000m
      memory: 1280Mi
    requests:
      cpu: 500m
      memory: 640Mi

## Keycloak integration. Two distinct concerns share this top-level key:
##
##   1. The legacy admin-API client used by the backend service to call
##      Keycloak as a confidential M2M client (jit-backend-admin etc).
##      This is `clientSecret` and is consumed by `keycloak_service.py`.
##
##   2. The new public SPA client (`zero-trust-dashboard`) used directly
##      by the browser. This is configured under `dashboardClient` and is
##      surfaced to the SPA via the `auth-config.json` ConfigMap.
keycloak:
  clientSecret: "ChangeMe-JITBackend-2026!"

  ## Public Ingress URL for Keycloak (see platform-identity/keycloak).
  ## Must match what browsers use; issuer will be
  ##   {url}/realms/{realm}
  url: "https://keycloak.licenta.ro"

  ## Must match the realm imported in Keycloak (values-configmap) and the
  ## Terraform module under keycloak-bootstrap/terraform (ZeroTrust-Realm).
  realm: "ZeroTrust-Realm"

  ## Public OIDC client — created by GitOps Terraform:
  ##   infra-tools/.../keycloak-bootstrap/terraform/dashboard-client.tf
  ## (Flux object: keycloak-clients-bootstrap in platform-identity).
  dashboardClient:
    clientId: "zero-trust-dashboard"
    audience: "zero-trust-dashboard"
    groupsClaim: "groups"

## Authentication enforcement at the backend layer.
auth:
  ## DEV-ONLY. When true, the backend skips JWT validation entirely and
  ## injects a synthetic identity in *all* groups. NEVER turn this on in
  ## production. Default is false.
  bypass: false

  ## Email used by the synthetic identity when bypass is enabled. Useful
  ## for e2e tests that grep audit logs by email.
  bypassEmail: "dev@devsecops.licenta.ro"

## GUAC (Graph for Understanding Artifact Composition) — knowledge-graph
## proxy used by the Blast Radius UI. Tracks the official guacsec/guac
## Helm chart Service name. Set graphqlUrl to "" to disable the feature
## (the backend's /api/v1/guac/health endpoint will report "reachable: false"
## and the UI will gracefully disable the Simulate Blast Radius button).
guac:
  graphqlUrl: http://graphql-server.guac.svc.cluster.local:8080/query

## JIT access: data the backend embeds into the downloadable kubeconfig for a JIT session.
## externalApiServer MUST be the externally reachable kube-apiserver URL (NOT the in-cluster
## kubernetes.default.svc, which a developer's laptop can't reach). clusterCaData is optional:
## leave empty to fall back to the backend pod's in-cluster CA
## (/var/run/secrets/kubernetes.io/serviceaccount/ca.crt). Set it to the base64
## certificate-authority-data from your admin kubeconfig if the in-cluster CA doesn't validate
## the external endpoint; otherwise the kubeconfig uses insecure-skip-tls-verify.
jit:
  externalApiServer: "https://178.105.152.139:6443"
  clusterCaData: ""

## Break-Glass / eBPF honeypot integration. The Secret is created by the
## ebpf-honeypot pre-install Job (jwt-keygen), see ebpf-honeypot/values.yaml
## (jwt.backendSecretName / jwt.backendNamespace).
breakglass:
  enabled: true
  secretName: "ebpf-honeypot-jwt-keypair"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    # cert-manager auto-issues the TLS cert for the host below via Let's Encrypt
    # HTTP-01; nginx redirects all plain HTTP to HTTPS.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Keycloak access tokens with embedded group claims can easily exceed
    # the default 8k buffer; bump it so the upstream (nginx in the
    # frontend pod) doesn't reject them with 502.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    # Keep the Authorization header end-to-end.
    nginx.ingress.kubernetes.io/upstream-vhost: "$service_name.$namespace.svc.cluster.local"
  hosts:
    - host: dashboard.ggdevs.site
      paths:
        - path: /
          pathType: Prefix
  # cert-manager writes the issued cert here; the Ingress serves TLS from it.
  tls:
    - hosts:
        - dashboard.ggdevs.site
      secretName: dashboard-ggdevs-site-tls

serviceAccount:
  create: true
  name: "zero-trust-dashboard-sa"

networkPolicies:
  enabled: false
