apiVersion: v1
kind: Service
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-backend
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "zero-trust-dashboard.name" . }}-backend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-frontend
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "zero-trust-dashboard.name" . }}-frontend
