apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-frontend-auth
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-frontend
data:
  ## Served from the SPA at /auth-config.json. The frontend reads this
  ## file BEFORE Keycloak is initialised so cluster operators can change
  ## the realm / URL / client-id without rebuilding the SPA image.
  ##
  ## Schema mirrors `app/security/identity.AuthConfig` exposed via
  ## /api/v1/auth/config — keep them in sync.
  auth-config.json: |-
    {
      "authentication": {
        "url": {{ .Values.keycloak.url | quote }},
        "realm": {{ .Values.keycloak.realm | quote }},
        "client_id": {{ .Values.keycloak.dashboardClient.clientId | quote }},
        "audience": {{ .Values.keycloak.dashboardClient.audience | quote }},
        "issuer": "{{ .Values.keycloak.url }}/realms/{{ .Values.keycloak.realm }}",
        "bypass": {{ .Values.auth.bypass }}
      }
    }
