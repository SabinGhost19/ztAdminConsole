fullnameOverride: "zero-trust-dashboard"

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/sabinghost19/ztadminconsole-frontend
    pullPolicy: IfNotPresent
    tag: "7fc062c"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/sabinghost19/ztadminconsole-backend
    pullPolicy: IfNotPresent
    tag: "7fc062c"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: dashboard.devsecops.licenta.ro
      paths:
        - path: /
          pathType: Prefix

serviceAccount:
  create: true
  name: "zero-trust-dashboard-sa"

networkPolicies:
  enabled: false
