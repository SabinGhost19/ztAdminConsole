apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-frontend-nginx
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-frontend
data:
  default.conf: |-
    server {
      listen 80;
      server_name localhost;
      resolver 10.43.0.10 valid=10s ipv6=off;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        set $backend_upstream "http://{{ include "zero-trust-dashboard.fullname" . }}-backend.{{ .Release.Namespace }}.svc.cluster.local:8000";
        proxy_pass $backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Authorization $http_authorization;
      }

      location = /auth-config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
      }

      location = /silent-check-sso.html {
        try_files $uri =404;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
