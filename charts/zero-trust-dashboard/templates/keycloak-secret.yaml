apiVersion: v1
kind: Secret
metadata:
  name: jit-backend-keycloak
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-backend
type: Opaque
data:
  # Base64 encoded: ChangeMe-JITBackend-2026!
  # This matches the jit_backend_client_secret from terraform/locals.tf
  client-secret: {{ .Values.keycloak.clientSecret | b64enc }}
