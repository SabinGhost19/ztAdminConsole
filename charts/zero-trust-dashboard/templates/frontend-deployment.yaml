apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-frontend
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "zero-trust-dashboard.name" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "zero-trust-dashboard.name" . }}-frontend
    spec:
      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers:
          - 10.43.0.10
        searches:
          - {{ .Release.Namespace }}.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: auth-config
              mountPath: /usr/share/nginx/html/auth-config.json
              subPath: auth-config.json
              readOnly: true
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "zero-trust-dashboard.fullname" . }}-frontend-nginx
            items:
              - key: default.conf
                path: default.conf
        - name: auth-config
          configMap:
            name: {{ include "zero-trust-dashboard.fullname" . }}-auth-config
            items:
              - key: auth-config.json
                path: auth-config.json
