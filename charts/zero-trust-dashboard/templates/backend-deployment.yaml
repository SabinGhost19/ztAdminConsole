apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-backend
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "zero-trust-dashboard.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "zero-trust-dashboard.name" . }}-backend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health # Ensure you have a health endpoint in FastAPI
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak.platform-identity.svc.cluster.local/"
            - name: KEYCLOAK_REALM
              value: "ZeroTrust-Realm"
            - name: KEYCLOAK_CLIENT_ID
              value: "jit-backend-api"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jit-backend-keycloak
                  key: client-secret
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
