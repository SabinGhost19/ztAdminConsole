apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-frontend-nginx
  labels:
    app: {{ include "zero-trust-dashboard.name" . }}-frontend
data:
  default.conf: |-
    server {
      listen 80;
      server_name localhost;
      resolver 10.43.0.10 valid=10s ipv6=off;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        set $backend_host "{{ include "zero-trust-dashboard.fullname" . }}-backend.{{ .Release.Namespace }}.svc.cluster.local:8000";
        proxy_pass http://$backend_host$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Authorization $http_authorization;
      }

      location = /auth-config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
      }

      location = /silent-check-sso.html {
        try_files $uri =404;
      }

      # Hashed Vite assets must NEVER fall back to index.html. When a
      # browser holds a stale index.html that references old chunk
      # hashes (e.g. JitAccess-DOPOrtoN.js), the file no longer exists
      # on disk. Falling back to index.html would serve text/html for a
      # request the browser expects as ES module, triggering the
      # "Loading module ... was blocked because of a disallowed MIME
      # type" error. Returning 404 is correct: the browser then knows
      # to fail loudly instead of executing HTML as JavaScript.
      # Filenames are content-hashed by Vite, so we cache aggressively.
      location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
      }

      # index.html is the single source of truth that maps the current
      # set of chunk hashes — it must never be cached. A stale
      # index.html is the root cause of the MIME-type breakage above.
      location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
