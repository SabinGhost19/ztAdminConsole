{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-role
rules:
  # Management of Zero Trust Custom Resources
  - apiGroups: ["devsecops.licenta.ro"]
    resources:
      - jitaccessrequests
      - zerotrustapplications
      - supplychainattestations
      - zerotrustsecrets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Status subresource patches (used by the JIT approval endpoint to set
  # status.approved=true, which triggers the operator's field watcher).
  - apiGroups: ["devsecops.licenta.ro"]
    resources:
      - jitaccessrequests/status
    verbs: ["get", "patch", "update"]
  # Read-only access for Break-Glass / eBPF Honeypot policy listing
  # (GET /api/v1/breakglass/policies in breakglass_service.list_policies).
  - apiGroups: ["devsecops.licenta.ro"]
    resources:
      - nodeprotectionpolicies
    verbs: ["get", "list", "watch"]
  # Required for Drift Detection and Dashboard Overview Insights
  - apiGroups: ["", "apps", "networking.k8s.io", "security.istio.io", "crds.external-secrets.io"]
    resources:
      - pods
      - configmaps
      - events
      - namespaces
      - deployments
      - networkpolicies
      - authorizationpolicies
      - secrets
      - externalsecrets
    verbs: ["get", "list", "watch", "patch", "update"]
  # Required for JIT Web Apps Listing (Ingress Radar)
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zero-trust-dashboard.fullname" . }}-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zero-trust-dashboard.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
